name: Deploy Minify CSS and HTML

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install minification tools
        run: |
          npm install -g clean-css-cli html-minifier-terser
      
      - name: Create build directory
        run: mkdir -p build
      
      - name: Copy all files to build directory
        run: |
          cp -r * build/ 2>/dev/null || :
          cp .nojekyll build/ 2>/dev/null || :
          cp _headers build/ 2>/dev/null || :
      
      - name: Minify CSS in build directory
        run: |
          if [ -f build/style.css ]; then
            npx clean-css-cli -o build/style.css build/style.css
          fi
      
      - name: Minify HTML in build directory
        run: |
          for file in build/*.html; do
            if [ -f "$file" ]; then
              echo "Minifying $file"
              npx html-minifier-terser "$file" \
                -o "$file" \
                --collapse-whitespace \
                --remove-comments \
                --minify-css true \
                --minify-js true
            fi
          done
      
      - name: Add version hash to assets
        run: |
          # Получаем короткий хеш коммита (первые 7 символов)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "Adding version hash: $COMMIT_HASH to assets"
          
          # Проходим по всем HTML файлам в папке build
          for file in build/*.html; do
            if [ -f "$file" ]; then
              echo "Processing $file"
              
              # Добавляем хеш ко всем ссылкам на CSS
              sed -i "s/\(href=[\"']\/[^\"]*\.css\)\"/\1?v=$COMMIT_HASH\"/g" "$file"
              sed -i "s/\(href=[\"']\/[^\"]*\.css\)?[^\"]*\"/\1?v=$COMMIT_HASH\"/g" "$file"
              
              # Добавляем хеш ко всем ссылкам на JS
              sed -i "s/\(src=[\"']\/[^\"]*\.js\)\"/\1?v=$COMMIT_HASH\"/g" "$file"
              sed -i "s/\(src=[\"']\/[^\"]*\.js\)?[^\"]*\"/\1?v=$COMMIT_HASH\"/g" "$file"
              
              echo "✅ Added version $COMMIT_HASH to $file"
            fi
          done
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'GitHub Actions Bot'
          user_email: 'actions@github.com'