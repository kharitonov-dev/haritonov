name: Deploy Minify CSS and HTML

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-deploy:
    name: Deploy Minify CSS and HTML
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install tools
        run: |
          npm install -g clean-css-cli html-minifier-terser critical http-server

      - name: Create build directory
        run: mkdir -p build

      - name: Copy all files to build directory
        run: |
          cp -r * build/ 2>/dev/null || :
          cp .nojekyll build/ 2>/dev/null || :
          cp _headers build/ 2>/dev/null || :

      - name: Generate critical CSS
        run: |
          npm install -g http-server
          npx http-server build -p 8080 > /dev/null 2>&1 &
          SERVER_PID=$!
          sleep 5
          npx critical http://localhost:8080/index.html --base build/ --inline --width 375 --height 812 > build/critical-raw.css 2> /dev/null || true
          kill $SERVER_PID 2>/dev/null || true
          if [ ! -s build/critical-raw.css ]; then
            rm -f build/critical-raw.css
            exit 0
          fi
          cat build/critical-raw.css | grep -E '^[.#@a-zA-Z]|^\s*[a-zA-Z-]+:|^\s*}' | grep -v '</' | grep -vE '[а-яА-ЯёЁ]' > build/critical.css || true
          if [ ! -s build/critical.css ]; then
            rm -f build/critical-raw.css build/critical.css
            exit 0
          fi
          for file in build/*.html; do
            if [ -f "$file" ]; then
              TMP_FILE="${file}.tmp"
              node -e "
                const fs = require('fs');
                try {
                  const html = fs.readFileSync('$file', 'utf8');
                  const css = fs.readFileSync('build/critical.css', 'utf8');
                  const result = html.replace(
                    /<style>[\s\S]*?<\/style>/,
                    '<style>' + css + '</style>'
                  );
                  fs.writeFileSync('$TMP_FILE', result);
                } catch (err) {
                  process.exit(1);
                }
              "
              mv "$TMP_FILE" "$file"
            fi
          done
          rm -f build/critical-raw.css build/critical.css

      - name: Minify CSS in build directory
        run: |
          if [ -f build/style.css ]; then
            npx clean-css-cli -o build/style.css build/style.css
          fi

      - name: Minify HTML in build directory
        run: |
          for file in build/*.html; do
            if [ -f "$file" ]; then
              npx html-minifier-terser "$file" \
                -o "$file" \
                --collapse-whitespace \
                --remove-comments \
                --minify-css true \
                --minify-js true
            fi
          done

      - name: Add version hash to assets
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          for file in build/*.html; do
            if [ -f "$file" ]; then
              sed -i "s/\(href=[\"']\/[^\"]*\.css\)\"/\1?v=$COMMIT_HASH\"/g" "$file"
              sed -i "s/\(href=[\"']\/[^\"]*\.css\)?[^\"]*\"/\1?v=$COMMIT_HASH\"/g" "$file"
              sed -i "s/\(src=[\"']\/[^\"]*\.js\)\"/\1?v=$COMMIT_HASH\"/g" "$file"
              sed -i "s/\(src=[\"']\/[^\"]*\.js\)?[^\"]*\"/\1?v=$COMMIT_HASH\"/g" "$file"
            fi
          done

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
          force_orphan: false
          user_name: "GitHub Actions Bot"
          user_email: "actions@github.com"
